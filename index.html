<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Special Birthday Wish</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&family=Hind+Siliguri:wght@400;600&display=swap');

        :root {
            --gold: #d4af37;
            --rose: #ff758c;
            --soft-white: #fffafa;
            --shadow: rgba(0, 0, 0, 0.1);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            overflow: hidden;
            font-family: 'Poppins', 'Hind Siliguri', sans-serif;
            background: #fdfbfb;
            display: flex; justify-content: center; align-items: center;
            transition: background 2s ease;
        }

        /* Sparkle Overlay */
        #sparkles {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 5;
        }

        /* Main Glass Card */
        #card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 2.5rem;
            border-radius: 2.5rem;
            box-shadow: 0 20px 60px rgba(0,0,0,0.1);
            text-align: center;
            width: 90%;
            max-width: 500px;
            z-index: 100;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.6);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            max-height: 85vh;
            overflow-y: auto;
        }

        #message-box {
            font-size: 1.4rem;
            color: #333;
            line-height: 1.6;
            transition: all 0.5s ease;
            white-space: pre-line;
        }

        .tap-to-continue {
            margin-top: 1.5rem;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--rose);
            font-weight: 600;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
            40% {transform: translateY(-5px);}
            60% {transform: translateY(-3px);}
        }

        /* Teddy Bear Styles */
        .teddy-container {
            position: absolute;
            bottom: -100px;
            transition: bottom 1s ease;
            z-index: 50;
            width: 120px;
        }

        #teddy-left { left: 5%; }
        #teddy-right { right: 5%; transform: scaleX(-1); }

        .teddy-svg { width: 100%; height: auto; }

        /* Cake & Celebration */
        #cake-box { display: none; margin-top: 20px; }
        .cake-icon { font-size: 4rem; cursor: pointer; position: relative; display: inline-block; }
        .flame {
            position: absolute; top: -10px; left: 50%;
            transform: translateX(-50%); font-size: 1.5rem;
            animation: flicker 0.2s infinite alternate;
        }

        @keyframes flicker {
            from { opacity: 0.8; transform: translateX(-50%) scale(1); }
            to { opacity: 1; transform: translateX(-50%) scale(1.2); }
        }

        /* Balloons */
        .balloon {
            position: absolute; bottom: -150px; width: 50px; height: 65px;
            border-radius: 50%; z-index: 10; opacity: 0.8;
            animation: float 8s linear forwards;
        }
        @keyframes float {
            to { transform: translateY(-120vh) rotate(15deg); }
        }

        /* Music Button */
        #music-btn {
            position: fixed; top: 20px; right: 20px;
            background: white; border: none; width: 45px; height: 45px;
            border-radius: 50%; box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            cursor: pointer; z-index: 200; font-size: 1.2rem;
        }

        .bengali-text {
            font-family: 'Hind Siliguri', sans-serif;
            text-align: left;
            font-size: 1.1rem;
            color: #444;
        }
    </style>
</head>
<body onclick="progress()">

    <canvas id="sparkles"></canvas>

    <button id="music-btn" onclick="toggleMusic(event)">🎵</button>
    <audio id="birthday-song" loop>
        <!-- Updated to a festive, joyful birthday celebration track -->
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>

    <div id="teddy-left" class="teddy-container">
        <svg class="teddy-svg" viewBox="0 0 100 100">
            <circle cx="50" cy="60" r="35" fill="#a67c52" />
            <circle cx="30" cy="30" r="12" fill="#a67c52" />
            <circle cx="70" cy="30" r="12" fill="#a67c52" />
            <circle cx="50" cy="60" r="25" fill="#c49a6c" />
            <circle cx="40" cy="50" r="4" fill="#000" />
            <circle cx="60" cy="50" r="4" fill="#000" />
            <ellipse cx="50" cy="65" rx="8" ry="5" fill="#000" />
        </svg>
    </div>

    <div id="teddy-right" class="teddy-container">
        <svg class="teddy-svg" viewBox="0 0 100 100">
            <circle cx="50" cy="60" r="35" fill="#a67c52" />
            <circle cx="30" cy="30" r="12" fill="#a67c52" />
            <circle cx="70" cy="30" r="12" fill="#a67c52" />
            <circle cx="50" cy="60" r="25" fill="#c49a6c" />
            <circle cx="40" cy="50" r="4" fill="#000" />
            <circle cx="60" cy="50" r="4" fill="#000" />
            <ellipse cx="50" cy="65" rx="8" ry="5" fill="#000" />
        </svg>
    </div>

    <div id="card">
        <div id="message-box">Click to open my heart...</div>
        
        <div id="cake-box" onclick="blowOut(event)">
            <div id="candle-flame" class="flame">🔥</div>
            <div class="cake-icon">🎂</div>
            <p style="font-size: 10px; color: #888; margin-top: 5px;">TAP THE CANDLE TO WISH</p>
        </div>

        <div class="tap-to-continue" id="hint">Tap anywhere</div>
    </div>

    <script>
        const sequence = [
            "late wishes I am literally very sorry",
            "Sorry",
            "Sorry",
            "Sorry",
            "I know I missed the moment, but...",
            "পাপড়ি,\n\nগতকাল তোকে জন্মদিনের উইশ করতে পারিনি, তার জন্য সত্যিই খুব সরি। লিখতে চেয়েছিলাম, কিন্তু কিছু কথা, কিছু কষ্ট তখন এতটাই ভারী ছিল যে আর লেখা হয়ে ওঠেনি। এটা তোকে ভুলে যাওয়া নয়, এটা আমার মনের একটা দুর্বল মুহূর্ত।\n\nতুই আমার কাছে কখনোই শুধু একজন সাধারণ বন্ধু ছিলিস না। অন্য সব বন্ধুর থেকে অনেক আলাদা ছিলি, এখনো আছিস। হয়তো সময় বদলেছে, পরিস্থিতি বদলেছে, তবু তোর জন্য যে আলাদা একটা জায়গা ছিল, সেটা আজও ঠিক আগের মতোই আছে।\n\nযা কিছু হয়েছে, তার বেদনা নিয়ে হয়তো আমি দেরি করে ফেলেছি। কিন্তু তোর প্রতি আমার অনুভূতি বা সম্মান একটুও কমেনি। দেরিতে হলেও মন থেকে তোকে জন্মদিনের অনেক শুভেচ্ছা জানাচ্ছি। ভালো থাকিস, সুস্থ থাকিস, নিজের মতো করে হ্যাপি থাকিস।",
            "HAPPY BIRTHDAY! 🎉🎈✨",
            "One last thing for you..."
        ];

        let index = 0;
        const msgEl = document.getElementById('message-box');
        const card = document.getElementById('card');
        const song = document.getElementById('birthday-song');
        const cake = document.getElementById('cake-box');
        const hint = document.getElementById('hint');

        function progress() {
            if (index === 0) song.play().catch(e => {});

            if (index < sequence.length) {
                msgEl.style.opacity = 0;
                msgEl.style.transform = "scale(0.95)";

                setTimeout(() => {
                    msgEl.innerText = sequence[index];
                    
                    // Style for Bengali Letter
                    if (index === 5) {
                        msgEl.className = 'bengali-text';
                    } else {
                        msgEl.className = '';
                    }

                    // Effects Trigger
                    if (sequence[index].includes("BIRTHDAY")) {
                        startGloriousEffects();
                    }

                    if (index === sequence.length - 1) {
                        cake.style.display = 'block';
                        hint.style.display = 'none';
                    }

                    msgEl.style.opacity = 1;
                    msgEl.style.transform = "scale(1)";
                    index++;
                }, 400);
            }
        }

        function startGloriousEffects() {
            document.body.style.background = "linear-gradient(135deg, #ffafbd 0%, #ffc3a0 100%)";
            document.getElementById('teddy-left').style.bottom = "20px";
            document.getElementById('teddy-right').style.bottom = "20px";
            
            // Start Balloons
            setInterval(spawnBalloon, 500);
            // Start Sparkles
            initSparkles();
        }

        function spawnBalloon() {
            const b = document.createElement('div');
            b.className = 'balloon';
            const colors = ['#FFD700', '#FF758C', '#7AFAFF', '#ffffff', '#FFD1DC'];
            b.style.left = Math.random() * 90 + 'vw';
            b.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            document.body.appendChild(b);
            setTimeout(() => b.remove(), 8000);
        }

        function blowOut(e) {
            e.stopPropagation();
            document.getElementById('candle-flame').innerHTML = "💨";
            setTimeout(() => {
                document.getElementById('candle-flame').style.display = 'none';
                msgEl.innerText = "MAKE A WISH, PAPRI! ✨💖";
                burstConfetti();
            }, 500);
        }

        function burstConfetti() {
            for(let i=0; i<60; i++) {
                const c = document.createElement('div');
                c.innerText = ['💖','✨','⭐','🎉','🎈'][Math.floor(Math.random()*5)];
                c.style.position = 'fixed';
                c.style.left = '50vw';
                c.style.top = '50vh';
                c.style.fontSize = '24px';
                c.style.zIndex = '200';
                document.body.appendChild(c);
                
                const angle = Math.random() * Math.PI * 2;
                const dist = 50 + Math.random() * 50;
                
                c.animate([
                    { transform: 'translate(0,0) scale(1)', opacity: 1 },
                    { transform: `translate(${Math.cos(angle)*dist}vw, ${Math.sin(angle)*dist}vh) rotate(360deg)`, opacity: 0 }
                ], { duration: 3000, easing: 'ease-out', fill: 'forwards' });
            }
        }

        function toggleMusic(e) {
            e.stopPropagation();
            if (song.paused) { song.play(); e.target.innerText = "🎵"; }
            else { song.pause(); e.target.innerText = "🔇"; }
        }

        // Sparkle Logic
        function initSparkles() {
            const canvas = document.getElementById('sparkles');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            const stars = [];

            for(let i=0; i<100; i++) {
                stars.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 2,
                    opacity: Math.random(),
                    speed: 0.02 + Math.random() * 0.05
                });
            }

            function draw() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                stars.forEach(s => {
                    ctx.fillStyle = `rgba(255, 215, 0, ${s.opacity})`;
                    ctx.beginPath();
                    ctx.arc(s.x, s.y, s.size, 0, Math.PI*2);
                    ctx.fill();
                    s.opacity -= s.speed;
                    if(s.opacity <= 0) s.opacity = 1;
                });
                requestAnimationFrame(draw);
            }
            draw();
        }
    </script>
</body>
</html>
